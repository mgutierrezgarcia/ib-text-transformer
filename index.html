<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IB Text Transformer</title>

  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface2: #f0f3f7;
      --border: #d7dde5;

      --dark: #0e141b;
      --dark2: #151d27;

      --gold: #b08d3c;

      --text: #1b2430;
      --text-dim: #5a6775;
      --text-muted: #8b97a6;

      --green: #2e7d5b;
      --red: #b23a2a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 17px;
    }

    /* TOP BAR (IB DARK HEADER) */
    .topbar {
      background: var(--dark);
      color: #d7dde5;
      padding: 14px 40px;
      display: flex;
      justify-content: space-between;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* HEADER */
    .header {
      background: linear-gradient(180deg, var(--dark2), var(--bg));
      padding: 50px 40px 36px;
      border-bottom: 1px solid var(--border);
      color: white;
    }

    .header h1 {
      font-size: 38px;
      font-weight: 400;
    }

    .header h1 em {
      color: var(--gold);
      font-style: italic;
    }

    .header p {
      margin-top: 10px;
      color: #c9d3df;
      max-width: 650px;
      line-height: 1.6;
    }

    /* API SECTION */
    .api-section {
      padding: 24px 40px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    input {
      width: 420px;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-family: monospace;
      color: var(--text);
    }

    /* WORKSPACE (CLEAN IB MEMO STYLE) */
    .workspace {
      padding: 30px 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      background: var(--bg);
    }

    textarea {
      width: 100%;
      min-height: 360px;
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
      outline: none;
      transition: border 0.2s;
    }

    textarea:focus {
      border-color: var(--gold);
    }

    textarea[readonly] {
      background: #fbfcfe;
    }

    /* ACTION BAR */
    .action-row {
      padding: 0 40px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn-transform {
      background: var(--dark);
      color: white;
      border: none;
      padding: 12px 28px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-transform:hover {
      background: #1b2633;
    }

    .status {
      margin-left: auto;
      font-family: monospace;
      font-size: 12px;
      color: var(--text-muted);
    }

    .status.success { color: var(--green); }
    .status.error { color: var(--red); }

    /* FOOTER */
    .footer {
      background: var(--dark);
      color: #a7b0bb;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      font-family: monospace;
      font-size: 10px;
      border-top: 1px solid #1f2a36;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div>IB TEXT TRANSFORMER</div>
  <div>CLAUDE POWERED SYSTEM</div>
</div>

<div class="header">
  <h1>Investment Banking<br><em>Text Transformer</em></h1>
  <p>Convert informal communication into institutional-grade investment banking language used in top-tier financial institutions.</p>
</div>

<div class="api-section">
  <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
  <button onclick="saveKey()">Save</button>
</div>

<div class="workspace">
  <textarea id="inputText" placeholder="Input text..."></textarea>
  <textarea id="outputText" placeholder="Output..." readonly></textarea>
</div>

<div class="action-row">
  <button class="btn-transform" onclick="transform()">Transform</button>
  <div class="status" id="statusMsg"></div>
</div>

<div class="footer">
  <div>IB Transformer</div>
  <div>Claude Sonnet 4</div>
</div>

<script>
let apiKey = localStorage.getItem("ib_api_key") || "";
if (apiKey) document.getElementById("apiKeyInput").value = apiKey;

function saveKey() {
  apiKey = document.getElementById("apiKeyInput").value;
  localStorage.setItem("ib_api_key", apiKey);
  setStatus("API saved", "success");
}

function setStatus(msg, type = "") {
  const el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.className = "status " + type;
}

const systemPrompt = `
You are a senior investment banking professional at a top-tier global firm (e.g., Goldman Sachs, Morgan Stanley, J.P. Morgan).

TASK
Rewrite the input text into professional investment banking communication suitable for:
- Pitch books
- Client memos
- Investment committee materials
- Internal executive communication

STYLE REQUIREMENTS
- Extremely concise, structured and executive-level
- Formal financial and analytical tone
- Use precise investment banking terminology
- Prioritize clarity, logic and business impact
- Convert informal language into institutional-grade language

STRUCTURE
- Use short paragraphs or bullet points when appropriate
- Ensure logical flow: context → analysis → implication (if applicable)
- Emphasize business relevance and decision-useful insights

STRICT RULES
- Do NOT invent facts, numbers, or assumptions not present in the input
- Do NOT add commentary or explanations
- Do NOT include introductions like "Here is the revised text"
- Output ONLY the transformed text

QUALITY BAR
The output should read like it was written by an Associate or VP in a bulge-bracket investment bank.
`;

async function transform() {
  const input = document.getElementById("inputText").value;

  if (!apiKey) return setStatus("Missing API key", "error");

  setStatus("Processing...");

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1024,
      system: systemPrompt,
      messages: [{ role: "user", content: input }]
    })
  });

  const data = await res.json();
  document.getElementById("outputText").value = data.content[0].text;

  setStatus("Done", "success");
}
</script>

</body>
</html>
